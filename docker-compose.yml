services:
  iot-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_pass
      POSTGRES_DB: iot_health
    ports:
      - "5433:5432"
    volumes:
      - iot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot_health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network

  cadenza-db-service:
    container_name: cadenza-db-service
    build:
      context: ./database
      dockerfile: Dockerfile
    env_file:
      - ./database/.env
    depends_on:
      iot-db:
        condition: service_healthy
    volumes:
      - shared_telemetry:/shared
    working_dir: /app
    command: npm start
    networks:
      - iot-network

  iot-db-service:
    container_name: iot-db-service
    build:
      context: ./database/iot-db-service
      dockerfile: Dockerfile
    env_file:
      - ./database/iot-db-service/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
    depends_on:
      iot-db:
        condition: service_healthy
      cadenza-db-service:
        condition: service_started
    volumes:
      - shared_telemetry:/shared
    working_dir: /app
    command: npm start
    networks:
      - iot-network

  telemetry-collector:
    build:
      context: ./services/telemetry-collector
      dockerfile: Dockerfile
    env_file:
      - ./services/telemetry-collector/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
    depends_on:
      - cadenza-db-service
      - iot-db-service
      - anomaly-detector
      - predictor
      - alert-service
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    command: npm start
    networks:
      - iot-network

  anomaly-detector:
    build:
      context: ./services/anomaly-detector
      dockerfile: Dockerfile
    env_file:
      - ./services/anomaly-detector/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
    depends_on:
      - cadenza-db-service
      - iot-db-service
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    command: npm start
    networks:
      - iot-network

  predictor:
    build:
      context: ./services/predictor
      dockerfile: Dockerfile
    env_file:
      - ./services/predictor/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
    depends_on:
      - cadenza-db-service
      - iot-db-service
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    command: npm start
    networks:
      - iot-network

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    env_file:
      - ./services/alert-service/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
    depends_on:
      - cadenza-db-service
      - iot-db-service
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    command: npm start
    networks:
      - iot-network

  scheduled-runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    env_file:
      - ./runner/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - TRAFFIC_MODE=low
      - DEVICE_COUNT=50
    depends_on:
      - cadenza-db-service
      - iot-db-service
      - telemetry-collector
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    command: npm start
    networks:
      - iot-network

volumes:
  iot_pgdata:
  shared_telemetry:

networks:
  iot-network:
    driver: bridge
