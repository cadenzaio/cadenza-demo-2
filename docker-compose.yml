services:
  iot-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_pass
      POSTGRES_DB: iot_health
    ports:
      - "5433:5432"
    volumes:
      - iot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot_health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-network

  cadenza-db-service:
    container_name: cadenza-db-service
    build:
      context: ./database
      dockerfile: Dockerfile
    env_file:
      - ./database/.env
    depends_on:
      iot-db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e 'const fs=require("fs");
          const stat=fs.statSync("/proc/1");
          const ageMs=Date.now()-Math.max(stat.ctimeMs, stat.mtimeMs);
          if (ageMs < 3000) process.exit(1);
          fetch("http://127.0.0.1:8080/handshake",{method:"POST",headers:{"content-type":"application/json"},body:"{}"})
            .then((response)=>process.exit(response.ok ? 0 : 1))
            .catch(()=>process.exit(1));'
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - shared_telemetry:/shared
    working_dir: /app
    networks:
      - iot-network

  iot-db-service:
    container_name: iot-db-service
    build:
      context: ./database/iot-db-service
      dockerfile: Dockerfile
    env_file:
      - ./database/iot-db-service/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - PUBLIC_ORIGIN=http://iot-db.localhost
    depends_on:
      iot-db:
        condition: service_healthy
      cadenza-db-service:
        condition: service_healthy
    volumes:
      - shared_telemetry:/shared
    working_dir: /app
    networks:
      - iot-network

  telemetry-collector:
    build:
      context: ./services/telemetry-collector
      dockerfile: Dockerfile
    env_file:
      - ./services/telemetry-collector/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - PUBLIC_ORIGIN=http://telemetry-collector.localhost
    depends_on:
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
      anomaly-detector:
        condition: service_started
      predictor:
        condition: service_started
      alert-service:
        condition: service_started
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    networks:
      - iot-network

  telemetry-collector-b:
    build:
      context: ./services/telemetry-collector
      dockerfile: Dockerfile
    env_file:
      - ./services/telemetry-collector/.env
    environment:
      - CADENZA_SERVER_URL=telemetry-collector-b
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - PUBLIC_ORIGIN=http://telemetry-collector-b.localhost
    depends_on:
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
      anomaly-detector:
        condition: service_started
      predictor:
        condition: service_started
      alert-service:
        condition: service_started
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    networks:
      - iot-network

  anomaly-detector:
    build:
      context: ./services/anomaly-detector
      dockerfile: Dockerfile
    env_file:
      - ./services/anomaly-detector/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - PUBLIC_ORIGIN=http://anomaly-detector.localhost
    depends_on:
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    networks:
      - iot-network

  predictor:
    build:
      context: ./services/predictor
      dockerfile: Dockerfile
    env_file:
      - ./services/predictor/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - WEATHER_API_KEY=${WEATHER_API_KEY:-}
      - PUBLIC_ORIGIN=http://predictor.localhost
    depends_on:
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    networks:
      - iot-network

  alert-service:
    build:
      context: ./services/alert-service
      dockerfile: Dockerfile
    env_file:
      - ./services/alert-service/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - PUBLIC_ORIGIN=http://alert-service.localhost
    depends_on:
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    networks:
      - iot-network

  scheduled-runner:
    build:
      context: ./runner
      dockerfile: Dockerfile
    env_file:
      - ./runner/.env
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - TRAFFIC_MODE=low
      - DEVICE_COUNT=50
    depends_on:
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
      telemetry-collector:
        condition: service_started
      telemetry-collector-b:
        condition: service_started
    volumes:
      - shared_telemetry:/shared
      - ./scripts:/scripts:ro
    working_dir: /app
    networks:
      - iot-network

  frontend:
    container_name: demo-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - CADENZA_DB_ADDRESS=cadenza-db-service
      - CADENZA_DB_PORT=8080
      - NUXT_PUBLIC_CADENZA_BOOTSTRAP_URL=http://cadenza-db.localhost:80
      - NUXT_PUBLIC_APP_ORIGIN=http://frontend.localhost
      - HOST=0.0.0.0
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
      telemetry-collector:
        condition: service_started
      telemetry-collector-b:
        condition: service_started
      anomaly-detector:
        condition: service_started
      predictor:
        condition: service_started
      alert-service:
        condition: service_started
      scheduled-runner:
        condition: service_started
    networks:
      - iot-network

  edge:
    build:
      context: ./edge
      dockerfile: Dockerfile
    container_name: cadenza-demo-2-edge
    depends_on:
      frontend:
        condition: service_started
      cadenza-db-service:
        condition: service_healthy
      iot-db-service:
        condition: service_started
      telemetry-collector:
        condition: service_started
      anomaly-detector:
        condition: service_started
      predictor:
        condition: service_started
      alert-service:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - iot-network

volumes:
  iot_pgdata:
  shared_telemetry:

networks:
  iot-network:
    driver: bridge
